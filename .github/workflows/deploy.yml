name: CI/CD Pipeline LKS Modul 2

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code dari GitHub
      uses: actions/checkout@v4

    - name: Login ke Docker Hub Otomatis
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image & Push ke Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: alka31/web-app-lks:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy ke EC2 Menggunakan SSH Native
      env:
        # Trik tanda pipa | di bawah ini memaksa format teks baris per baris dibaca utuh sempurna
        SSH_KEY: |
          ${{ secrets.EC2_SSH_KEY }}
        HOST: ${{ secrets.EC2_PUBLIC_IP }}
        USER: ec2-user
      run: |
        # 1. Siapkan folder .ssh dan generate file id_rsa
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # 2. Kirim perintah deploy langsung ke server EC2
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $USER@$HOST "docker stop web-app-container || true && docker rm web-app-container || true && docker pull alka31/web-app-lks:latest && docker run -d --name web-app-container -p 80:3000 alka31/web-app-lks:latest" 