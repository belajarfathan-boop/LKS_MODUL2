name: CI/CD Pipeline LKS Modul 2

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code dari GitHub
      uses: actions/checkout@v4

    - name: Login ke Docker Hub Otomatis
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image & Push ke Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: alka31/web-app-lks:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Kirim Perintah Deploy ke EC2
      env:
        SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        HOST: ${{ secrets.EC2_PUBLIC_IP }}
        USER: ec2-user
      run: |
        mkdir -p ~/.ssh
        printf "%s\n" "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # Eksekusi perintah setup server + deploy container secara otomatis
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $USER@$HOST "
          # 1. Update package manager dan instal Docker jika belum ada
          if ! command -v docker &> /dev/null; then
            echo 'Docker belum ada, menginstal via dnf/yum...'
            sudo dnf update -y && \
            sudo dnf install -y docker && \
            sudo systemctl start docker && \
            sudo systemctl enable docker && \
            sudo usermod -aG docker ec2-user
            # Berikan jeda waktu agar socket Docker siap digunakan
            sleep 5
          fi

          # 2. Jalankan proses deployment seperti biasa (Gunakan sudo untuk memastikan izin akses aman)
          sudo docker stop web-app-container || true && \
          sudo docker rm web-app-container || true && \
          sudo docker pull alka31/web-app-lks:latest && \
          sudo docker run -d --name web-app-container -p 80:3000 alka31/web-app-lks:latest
        " 