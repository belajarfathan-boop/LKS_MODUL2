name: CI/CD Pipeline LKS Modul 2

# Pipeline ini bakal otomatis jalan SETIAP KALI lu ngelakuin 'git push' ke branch main/master
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code dari GitHub
      uses: actions/checkout@v4

    - name: Login ke Docker Hub Otomatis
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image & Push ke Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Menggunakan username 'alka31' dan nama image 'web-app-lks'
        tags: alka31/web-app-lks:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Masuk ke EC2 AWS & Jalankan Container Baru
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_PUBLIC_IP }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        USE_SFTP: false # <-- Baris krusial buat ngatasin eror sftp: command not found
        script: |
          # Matikan container lama kalau ada, biar ga bentrok port
          docker stop web-app-container || true
          docker rm web-app-container || true
          
          # Ambil image terbaru yang barusan di-push dari Docker Hub
          docker pull alka31/web-app-lks:latest
          
          # Hidupkan aplikasinya di port 80 (biar langsung bisa diakses lewat IP Publik)
          docker run -d --name web-app-container -p 80:3000 alka31/web-app-lks:latest 